<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1f1a"/>
      <stop offset="100%" style="stop-color:#0a1220"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" style="stop-color:#00d4a0;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#00d4a0;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4a0;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00d4a0;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#00d4a0;stop-opacity:0"/>
    </linearGradient>
    <filter id="textglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  
  <!-- Glow overlay -->
  <rect width="512" height="512" rx="96" fill="url(#glow)"/>
  
  <!-- Border subtle -->
  <rect width="512" height="512" rx="96" fill="none" stroke="#00d4a020" stroke-width="2"/>
  
  <!-- FS text -->
  <text x="256" y="300" 
    font-family="'Inter','SF Pro Display','Helvetica Neue',sans-serif" 
    font-weight="700" 
    font-size="200" 
    fill="#00d4a0"
    text-anchor="middle"
    dominant-baseline="middle"
    filter="url(#textglow)"
    letter-spacing="-8">FS</text>
  
  <!-- PRO label -->
  <text x="256" y="380" 
    font-family="'Inter','SF Pro Display','Helvetica Neue',sans-serif" 
    font-weight="500" 
    font-size="52" 
    fill="#00d4a060"
    text-anchor="middle"
    letter-spacing="12">PRO</text>
  
  <!-- Bottom accent line -->
  <line x1="128" y1="436" x2="384" y2="436" stroke="url(#lineGrad)" stroke-width="3" stroke-linecap="round"/>
</svg>
