<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  const s = size;
  const r = s * 0.18;
  
  // Background gradient dark
  const grad = ctx.createLinearGradient(0, 0, s, s);
  grad.addColorStop(0, '#0f1520');
  grad.addColorStop(1, '#0a1a14');
  
  // Rounded rect background
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s);
  ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();
  
  // Green glow circle bg
  const glow = ctx.createRadialGradient(s*0.5, s*0.45, 0, s*0.5, s*0.45, s*0.4);
  glow.addColorStop(0, 'rgba(0,212,160,0.15)');
  glow.addColorStop(1, 'rgba(0,212,160,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, s, s);
  
  const cx = s / 2;
  const cy = s * 0.46;
  const scale = s / 192;
  
  // FS letters
  ctx.font = `bold ${Math.round(72 * scale)}px 'Inter', system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  
  // Text shadow/glow
  ctx.shadowColor = '#00d4a0';
  ctx.shadowBlur = 20 * scale;
  ctx.fillStyle = '#00d4a0';
  ctx.fillText('FS', cx, cy);
  ctx.shadowBlur = 0;
  
  // "Pro" label
  ctx.font = `500 ${Math.round(22 * scale)}px 'Inter', system-ui, sans-serif`;
  ctx.fillStyle = 'rgba(0,212,160,0.6)';
  ctx.fillText('PRO', cx, cy + 48 * scale);
  
  // Bottom accent line
  const lineY = s * 0.88;
  const lineW = s * 0.45;
  const lineGrad = ctx.createLinearGradient(cx - lineW/2, 0, cx + lineW/2, 0);
  lineGrad.addColorStop(0, 'rgba(0,212,160,0)');
  lineGrad.addColorStop(0.5, '#00d4a0');
  lineGrad.addColorStop(1, 'rgba(0,212,160,0)');
  ctx.strokeStyle = lineGrad;
  ctx.lineWidth = 2 * scale;
  ctx.beginPath();
  ctx.moveTo(cx - lineW/2, lineY);
  ctx.lineTo(cx + lineW/2, lineY);
  ctx.stroke();
}

const c192 = document.getElementById('c192');
const c512 = document.getElementById('c512');
drawIcon(c192, 192);
drawIcon(c512, 512);

// Download links
document.body.innerHTML += '<br>';
['c192','c512'].forEach(id => {
  const c = document.getElementById(id);
  const a = document.createElement('a');
  a.href = c.toDataURL('image/png');
  a.download = `icon-${id.replace('c','')}.png`;
  a.textContent = `Download icon-${id.replace('c','')}.png`;
  a.style.display = 'block';
  document.body.appendChild(a);
});
</script>
</body>
</html>
